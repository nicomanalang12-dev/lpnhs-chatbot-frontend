<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPNHS Main Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-circle">L</div>
                <h1>LPNHS</h1>
                <h3>Main Assistant</h3>
            </div>
            
            <div class="info-section">
                <div class="info-item"><strong>CAMPUS:</strong> Main Building</div>
                <div class="info-item"><strong>HOURS:</strong> 7am - 5pm</div>
                <div class="info-item"><strong>LOC:</strong> Bamboo Organ Rd.</div>
            </div>

            <div class="sidebar-footer">
                <p>v1.0.2 - 2026</p>
            </div>
        </aside>

        <main class="chat-main">
            <div id="chat-box" class="chat-box">
                <div class="message bot">
                    Hello! Welcome to the LPNHS Main Assistant. How can I help you today?
                </div>
            </div>

            <div class="input-container">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
