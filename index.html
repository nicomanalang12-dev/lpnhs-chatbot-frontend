<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPNHS Main - AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h2>LPNHS Main Assistant</h2>
            <p>Located near the historic Bamboo Organ Church</p>
        </header>
        
        <div class="chat-box" id="chat-box">
            <div class="message bot">
                Hello! I am the official AI assistant for Las Piñas National High School - Main. Whether you have questions about enrollment, campus events, or need help with your STEM strand modules, I'm here to help! What's on your mind?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
